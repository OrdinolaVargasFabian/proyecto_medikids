name: Deploy Spring Boot to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Build with Maven
      working-directory: ./backend
      run: mvn clean package -DskipTests

    - name: Generate deployment package
      run: |
        mv backend/target/*.jar application.jar

    - name: Get current timestamp
      id: timestamp
      run: echo "timestamp=$(date +'%Y-%m-%dT%H-%M-%S')" >> $GITHUB_ENV

    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v22
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: backend-medikids
        environment_name: backend-medikids-env
        version_label: "v-${{ env.timestamp }}"
        region: ${{ secrets.AWS_REGION }}
        deployment_package: application.jar
